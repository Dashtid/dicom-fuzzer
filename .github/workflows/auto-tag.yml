name: Auto-tag on Version Bump

# Fires whenever pyproject.toml changes on main.
# If the version in pyproject.toml does not yet have a matching git tag,
# creates and pushes it, then triggers release.yml via workflow_dispatch
# (tag pushes via GITHUB_TOKEN do not trigger downstream workflows directly).

on:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"

# Serialize runs so two rapid pyproject.toml changes can't both race to create the same tag.
concurrency:
  group: auto-tag
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  auto-tag:
    name: Tag if version bumped
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 1  # Only HEAD needed — ls-remote queries remote directly

      - name: Read version from pyproject.toml
        id: ver
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | awk -F'"' '{print $2}')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse version from pyproject.toml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.ver.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.ver.outputs.version }} already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.ver.outputs.version }} does not exist — will create."
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"
          echo "Pushed tag v${{ steps.ver.outputs.version }}"

      # Tag pushes via GITHUB_TOKEN do not trigger downstream workflows.
      # workflow_dispatch is explicitly exempt from this restriction (GitHub docs).
      - name: Trigger release workflow
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          gh workflow run release.yml --ref "refs/tags/v${{ steps.ver.outputs.version }}"
          echo "Triggered release.yml for v${{ steps.ver.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
