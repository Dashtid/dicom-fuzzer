name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

# Cancel duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@374b9305c53f17cee51e793c1234cdb1897489d5  # v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.13

      - name: Verify tag matches pyproject.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v${TAG_VERSION} does not match pyproject.toml version ${PKG_VERSION}"
            exit 1
          fi
          echo "Version check passed: v${PKG_VERSION}"

      - name: Install dependencies
        run: |
          uv venv
          uv sync --all-extras

      - name: Run full test suite
        run: |
          uv run pytest tests/ -m "not slow" -o "addopts=" -v --cov=dicom_fuzzer --cov-report=xml --cov-report=html --timeout=60 --reruns=3 --reruns-delay=1
        timeout-minutes: 45

      - name: Build distribution packages
        run: uv build --out-dir .dist

      - name: Validate packages
        run: uvx twine check .dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v5
        with:
          name: python-package-distributions
          path: .dist/
          include-hidden-files: true

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/dicom-fuzzer
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        # Uses OIDC trusted publishing - no password needed
        # Configure at: https://pypi.org/manage/project/dicom-fuzzer/settings/publishing/

  github-release:
    name: Create GitHub Release
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4
        with:
          fetch-depth: 0

      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Extract changelog for this version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          # Extract the section for this version from CHANGELOG.md
          # Matches from "## [X.Y.Z]" to the next "## [" or end of file
          awk "/^## \[${TAG_VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > RELEASE_NOTES.md
          # If no changelog section found, fall back to commit log
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No CHANGELOG.md entry found for v${TAG_VERSION}, using commit log." >&2
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" > RELEASE_NOTES.md
            else
              git log --pretty=format:"- %s (%h)" -20 > RELEASE_NOTES.md
            fi
          fi
          echo "" >> RELEASE_NOTES.md
          echo "## Installation" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo '```bash' >> RELEASE_NOTES.md
          echo 'pip install dicom-fuzzer' >> RELEASE_NOTES.md
          echo '```' >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v2
        with:
          body_path: RELEASE_NOTES.md
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
