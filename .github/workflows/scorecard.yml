name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 7 * * 1" # weekly, Monday 07:00 UTC
  push:
    branches: ["main"]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code-scanning
      id-token: write # publish_results: true (sigstore signing)
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2 # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to api.securityscorecards.dev so the badge in README
          # auto-populates (uses the OIDC token from id-token: write).
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 7

      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: results.sarif
