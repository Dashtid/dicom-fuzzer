name: Fuzz

# Coverage-guided fuzzing of the project's own DICOM parsing entry point
# via atheris. Time-boxed -- this is a smoke fuzzer for regression catching,
# not a long-running campaign. For deep fuzzing, run targets locally for
# hours/days against the persistent corpus dir.

on:
  schedule:
    # Sunday 04:00 UTC -- off-peak, gives us a fresh weekly signal
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      duration:
        description: "Seconds per fuzz target (libfuzzer -max_total_time)"
        required: false
        default: "60"
  pull_request:
    paths:
      # Only run on PRs that could affect a fuzz target's behaviour
      - "tests/fuzz/**"
      - "dicom_fuzzer/core/dicom/parser.py"
      - "dicom_fuzzer/core/exceptions.py"
      - ".github/workflows/fuzz.yml"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  fuzz:
    name: Atheris (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz_parser, fuzz_mutator]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@374b9305c53f17cee51e793c1234cdb1897489d5 # v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.13
        # Atheris supports 3.11-3.13; pinning to 3.13 keeps the fuzz job
        # decoupled from the test matrix.
        run: uv python install 3.13

      - name: Install dependencies (with fuzz extra)
        run: uv sync --extra fuzz

      - name: Restore fuzz corpus
        # Lookup the latest cache by prefix; first run starts from empty.
        # The exact key is unique per run so save-step never collides.
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tests/fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Ensure corpus directory exists
        run: mkdir -p tests/fuzz/corpus/${{ matrix.target }}

      - name: Run ${{ matrix.target }}
        env:
          DURATION: ${{ inputs.duration || '60' }}
        # Step ceiling is libfuzzer duration plus headroom for atheris
        # bootstrap and python interpreter startup. Without headroom the
        # GH timeout fires before libfuzzer's clean DONE summary.
        # 35 minutes accommodates duration up to 1800s (30 min) with
        # 5 min headroom; libfuzzer's per-input timeout (1200s default)
        # bounds hang-input wastage so the ceiling never burns idle.
        run: |
          uv run python tests/fuzz/${{ matrix.target }}.py \
            tests/fuzz/corpus/${{ matrix.target }} \
            -max_total_time=${DURATION} \
            -print_final_stats=1 \
            -detect_leaks=0
        timeout-minutes: 35

      - name: Save fuzz corpus
        # Always save -- a partial corpus from a timeout/crash is still
        # valuable for the next run's seed.
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tests/fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        with:
          name: fuzz-crashes-${{ matrix.target }}
          # Include the corpus dir so any crash-triggering input is
          # preserved alongside the libfuzzer crash file.
          path: |
            crash-*
            leak-*
            timeout-*
            tests/fuzz/corpus/${{ matrix.target }}
          if-no-files-found: ignore
          retention-days: 14
